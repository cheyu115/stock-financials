name: Keep Render Alive

on:
  schedule:
    # 使用 cron 語法：每 14 分鐘執行一次
    - cron: '*/14 * * * *'
  workflow_dispatch: # 保留一個按鈕讓你可以手動觸發測試

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        # 請將下方的網址替換成你的 Render App 網址
        run: curl -s https://stock-financials-pzv1.onrender.com/ > /dev/null